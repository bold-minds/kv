name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # kv v0.3.0 bumped the go.mod floor to 1.23 for iter.Seq2.
          # Pin CI to a version >= 1.23; 'stable' picks the latest
          # stable release at each run, which always satisfies the
          # floor and keeps the matrix current.
          go-version: 'stable'

      - name: Install dependencies
        run: go mod download

      # Build validation (cross-platform).
      # Conditionally diffs go.sum only if present — pure-stdlib children have none.
      - name: Build validation
        shell: bash
        run: |
          go build ./...
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then
            git diff --exit-code go.sum
          fi

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: go test -v -coverprofile="coverage.out" ./...

      # Benchmarks as a CI smoke test: -benchtime=1x pins b.N = 1 for
      # every benchmark, so each runs exactly once. This verifies that
      # the benchmarks compile and don't panic without actually timing
      # anything. Real performance measurements belong on a dev machine,
      # not on shared CI runners — kv has several benchmarks that rebuild
      # a 100k-entry map inside each iteration (PickInPlace, OmitInPlace,
      # FilterInPlace using the StopTimer/StartTimer pattern), which
      # produced 12+ minute CI runs at full benchtime.
      - name: Run benchmarks (smoke test)
        run: go test -bench=. -benchtime=1x -benchmem ./...
